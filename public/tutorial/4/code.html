<script>
        function updateSelection(input) {
            // Reset all cards
            document.querySelectorAll('.bank-card').forEach(card => {
                card.classList.remove('bank-card-active');
            });
            document.querySelectorAll('.radio-circle div').forEach(dot => {
                dot.classList.add('hidden');
            });
            document.querySelectorAll('.radio-circle').forEach(circle => {
                circle.classList.remove('border-mint-dark');
                circle.classList.add('border-outline-variant');
            });

            // Set active card
            const card = input.closest('label').querySelector('.bank-card');
            const dot = input.closest('label').querySelector('.radio-circle div');
            const circle = input.closest('label').querySelector('.radio-circle');
            
            card.classList.add('bank-card-active');
            dot.classList.remove('hidden');
            circle.classList.remove('border-outline-variant');
            circle.classList.add('border-mint-dark');

            // Enable next button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.disabled = false;
            
            // Add extra styling to indicate focus
            nextBtn.classList.add('ring-4', 'ring-mint-dark/10');
            setTimeout(() => nextBtn.classList.remove('ring-4'), 400);
        }
    </script>
