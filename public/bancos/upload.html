<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Logos de Bancos</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .banco { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .banco h3 { margin-top: 0; }
        input[type="file"] { margin: 10px 0; }
        .preview { max-width: 200px; max-height: 100px; margin: 10px 0; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Subir Logos de Bancos de Chile</h1>
    <p>Sube los archivos PNG con los siguientes nombres (deben ser .png):</p>
    
    <div id="bancos-list"></div>
    
    <script>
        const bancos = [
            { id: 'banco-de-chile', nombre: 'Banco de Chile' },
            { id: 'banco-santander', nombre: 'Banco Santander' },
            { id: 'banco-estado', nombre: 'BancoEstado' },
            { id: 'banco-de-credito', nombre: 'Banco de Crédito e Inversiones (BCI)' },
            { id: 'banco-scotiabank', nombre: 'Scotiabank Chile' },
            { id: 'banco-itau', nombre: 'Itaú Corpbanca' },
            { id: 'banco-falabella', nombre: 'Banco Falabella' },
            { id: 'banco-ripley', nombre: 'Banco Ripley' },
            { id: 'banco-paris', nombre: 'Banco Paris' },
            { id: 'banco-cencosud', nombre: 'Banco Cencosud' },
            { id: 'banco-security', nombre: 'Banco Security' },
            { id: 'banco-rabobank', nombre: 'Rabobank Chile' },
            { id: 'banco-internacional', nombre: 'Banco Internacional' },
            { id: 'banco-bice', nombre: 'Banco BICE' },
            { id: 'banco-hsbc', nombre: 'HSBC Bank Chile' },
            { id: 'coopeuch', nombre: 'Coopeuch' },
            { id: 'banco-consorcio', nombre: 'Banco Consorcio' },
            { id: 'tenpo', nombre: 'Tenpo' },
            { id: 'mach', nombre: 'Mach' },
            { id: 'lider', nombre: 'Banco Líder' }
        ];

        const list = document.getElementById('bancos-list');

        bancos.forEach(banco => {
            const div = document.createElement('div');
            div.className = 'banco';
            div.innerHTML = `
                <h3>${banco.nombre}</h3>
                <p>Archivo requerido: <strong>${banco.id}.png</strong></p>
                <input type="file" accept=".png" id="file-${banco.id}" onchange="previewImage('${banco.id}')">
                <div id="preview-${banco.id}"></div>
                <button onclick="uploadFile('${banco.id}')">Subir Logo</button>
            `;
            list.appendChild(div);
        });

        function previewImage(id) {
            const fileInput = document.getElementById(`file-${id}`);
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById(`preview-${id}`);
                    preview.innerHTML = `<img src="${e.target.result}" class="preview" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function uploadFile(id) {
            const fileInput = document.getElementById(`file-${id}`);
            const file = fileInput.files[0];
            if (!file) {
                alert('Por favor selecciona un archivo PNG');
                return;
            }
            if (!file.name.endsWith('.png')) {
                alert('El archivo debe ser .png');
                return;
            }

            const formData = new FormData();
            formData.append('file', file, `${id}.png`);

            fetch(`/bancos/${id}.png`, {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (res.ok) {
                    alert(`Logo de ${id} subido correctamente!`);
                } else {
                    alert('Error al subir el archivo');
                }
            })
            .catch(err => {
                alert('Error: ' + err.message);
            });
        }
    </script>
</body>
</html>
