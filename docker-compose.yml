name: gestion-presupuesto

services:
  app:
    image: gestion-presupuesto:latest
    build: .
    container_name: gestion-presupuesto
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-gestion-presupuesto-secret-2026-prod}
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    x-casaos:
      envs:
        - name: JWT_SECRET
          description:
            en_us: "Secret key for JWT token signing. Change this to a random string for production security."
          default: "gestion-presupuesto-secret-2026-prod"
        - name: DATABASE_URL
          description:
            en_us: "PostgreSQL connection string from Supabase (e.g., postgresql://postgres:password@db.xxx.supabase.co:5432/postgres)"
        - name: GMAIL_CLIENT_ID
          description:
            en_us: "Google OAuth Client ID for Gmail API"
        - name: GMAIL_CLIENT_SECRET
          description:
            en_us: "Google OAuth Client Secret for Gmail API"
        - name: GMAIL_REDIRECT_URI
          description:
            en_us: "OAuth redirect URI (default: http://localhost:3000/oauth2callback)"
          default: "http://localhost:3000/oauth2callback"
      ports:
        - container: "3000"
          description:
            en_us: Web UI Port
      icon: "https://cdn-icons-png.flaticon.com/512/2933/2933116.png"
      title:
        custom: "Finance Master"
      description:
        en_us: "Gestión de Presupuesto Personal"
      index: "/"
      author: "Alejandro"
      port_map: "3000"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: "app"
  description:
    en_us: "Aplicación completa de gestión de presupuesto con PostgreSQL en Supabase."
  title:
    custom: "Finance Master"
