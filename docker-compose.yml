name: gestion-presupuesto

services:
  app:
    image: gestion-presupuesto:latest
    build: .
    container_name: gestion-presupuesto
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-gestion-presupuesto-secret-2026-prod}
      - PORT=3000
    volumes:
      # Volumen persistente para la base de datos SQLite
      # Se monta el directorio data/ completo para evitar problemas de ruta
      - /DATA/AppData/gestion-presupuesto/data:/app/server/data
    x-casaos:
      envs:
        - name: JWT_SECRET
          description:
            en_us: "Secret key for JWT token signing. Change this to a random string for production security."
          default: "gestion-presupuesto-secret-2026-prod"
      ports:
        - container: "3000"
          description:
            en_us: Web UI Port
      volumes:
        - container: /app/server/data
          description:
            en_us: Database Directory (SQLite)
      icon: "https://cdn-icons-png.flaticon.com/512/2933/2933116.png"
      title:
        custom: "Finance Master"
      description:
        en_us: "Gestión de Presupuesto Personal"
      index: "/"
      author: "Alejandro"
      port_map: "3000"

x-casaos:
  architectures:
    - amd64
    - arm64
  main: "app"
  description:
    en_us: "Aplicación completa de gestión de presupuesto con backend local en SQLite."
  title:
    custom: "Finance Master"
